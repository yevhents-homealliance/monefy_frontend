version: '3.9'

services:
  nuxt-app:
    image: nuxt-dev
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nuxt-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    command: pnpm dev --host 0.0.0.0